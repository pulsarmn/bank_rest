openapi: 3.1.0
info:
  title: Bank REST API
  description: Test assignment
  version: 1.0.0-SNAPSHOT
  contact:
    name: pulsarmn
    email: pulsarmn@yandex.ru

servers:
  - url: 'http://localhost:8000'

tags:
  - name: Authentication
    description: Registration, login, refresh token update

paths:
  /api/auth/register:
    post:
      tags: [Authentication]
      description: Registers a new user in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"

      responses:
        201:
          description: A user has been successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        400:
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        409:
          description: The login is already occupied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    RegistrationRequest:
      type: object
      properties:
        login:
          type: string
          minLength: 4
          maxLength: 64
        password:
          type: string
          minLength: 8
          maxLength: 64
        firstName:
          type: string
          minLength: 2
          maxLength: 32
        lastName:
          type: string
          minLength: 1
          maxLength: 32
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        message:
          type: string
          example: "Bad request"
