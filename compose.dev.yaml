services:
  database:
    image: postgres:17
    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: bank_database
    ports:
      - "5544:5432"
    volumes:
      - "pg_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer -d bank_database"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pg_data:
